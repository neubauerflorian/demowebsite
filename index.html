<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Grapher | Trial-Grade Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --bg: #0f172a;
    --panel: #1e293b;
    --text: #f8fafc;
    --accent: #38bdf8;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
}

.sidebar {
    width: 400px;
    background: var(--panel);
    padding: 2rem;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #334155;
}

h2 { color: var(--accent); margin-top: 0; }

.btn-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

button {
    padding: 10px;
    background: #334155;
    border: 1px solid #475569;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button.active,
button:hover {
    background: var(--accent);
    color: black;
}

textarea {
    flex-grow: 1;
    margin-top: 10px;
    background: #0f172a;
    color: #94a3b8;
    border: 1px solid #475569;
    border-radius: 8px;
    padding: 1rem;
    font-family: monospace;
}

.main {
    flex-grow: 1;
    padding: 2rem;
}

.chart-container {
    height: 600px;
    background: var(--panel);
    padding: 1rem;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>📊 TRIAL GRAPHER</h2>

    <div class="btn-group">
        <button onclick="changeType(this,'line')" class="active">LINE</button>
        <button onclick="changeType(this,'bar')">BAR</button>
        <button onclick="changeType(this,'pie')">PIE</button>
        <button onclick="changeType(this,'doughnut')">DONUT</button>
    </div>

    <p>CSV Input:</p>

<textarea id="dataInput" oninput="update()">
Time,Placebo,Drug A,Drug B
0,0,0,0
7,12,18,22
14,20,35,40
</textarea>

    <button onclick="download()">⬇️ Download PNG</button>
</div>

<div class="main">
    <div class="chart-container">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
let chart;
let currentType = 'line';

function parseCSV(text) {
    const rows = text.trim().split('\n').map(r => r.split(',').map(c => c.trim()));
    return {
        headers: rows[0],
        body: rows.slice(1)
    };
}

function buildDatasets(headers, body) {

    // Detect Mean + Error format
    if (headers.length === 3 && headers[1].toLowerCase() === 'mean') {
        return [{
            label: 'Mean',
            data: body.map(r => +r[1]),
            error: body.map(r => +r[2])
        }];
    }

    // Multi-arm
    return headers.slice(1).map((h, i) => ({
        label: h,
        data: body.map(r => +r[i + 1])
    }));
}

function getLabels(body) {
    return body.map(r => r[0]);
}

function color(i) {
    const palette = [
        '#38bdf8','#a855f7','#ec4899',
        '#f59e0b','#10b981','#ef4444'
    ];
    return palette[i % palette.length];
}

function update() {

    const text = document.getElementById('dataInput').value;
    const { headers, body } = parseCSV(text);

    const labels = getLabels(body);
    const raw = buildDatasets(headers, body);

    const datasets = raw.map((d,i)=>({
        label: d.label,
        data: d.data,
        borderColor: color(i),
        backgroundColor: color(i)+'66',
        tension: 0.3,
        borderWidth: 2
    }));

    const ctx = document.getElementById('canvas').getContext('2d');
    if(chart) chart.destroy();

    chart = new Chart(ctx,{
        type: currentType,
        data:{ labels, datasets },
        options:{
            responsive:true,
            plugins:{
                legend:{ labels:{ color:'#fff' }},
                tooltip:{
                    callbacks:{
                        label:(ctx)=>{
                            const d = raw[ctx.datasetIndex];
                            const val = ctx.raw;
                            if(d.error){
                                return `${ctx.dataset.label}: ${val} ± ${d.error[ctx.dataIndex]}`;
                            }
                            return `${ctx.dataset.label}: ${val}`;
                        }
                    }
                }
            },
            scales: ['pie','doughnut'].includes(currentType) ? {} : {
                x:{ ticks:{color:'#aaa'} },
                y:{ ticks:{color:'#aaa'} }
            }
        },
        plugins:[{
            id:'errorBars',
            afterDatasetsDraw(chart){
                const ctx = chart.ctx;

                chart.data.datasets.forEach((ds,i)=>{
                    const meta = chart.getDatasetMeta(i);
                    const d = raw[i];
                    if(!d.error) return;

                    meta.data.forEach((point,idx)=>{
                        const err = d.error[idx];
                        const y = chart.scales.y;

                        const top = y.getPixelForValue(ds.data[idx]+err);
                        const bot = y.getPixelForValue(ds.data[idx]-err);

                        ctx.beginPath();
                        ctx.moveTo(point.x,top);
                        ctx.lineTo(point.x,bot);
                        ctx.strokeStyle = ds.borderColor;
                        ctx.stroke();

                        ctx.beginPath();
                        ctx.moveTo(point.x-5,top);
                        ctx.lineTo(point.x+5,top);
                        ctx.moveTo(point.x-5,bot);
                        ctx.lineTo(point.x+5,bot);
                        ctx.stroke();
                    });
                });
            }
        }]
    });
}

function changeType(btn,type){
    document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentType = type;
    update();
}

function download(){
    const a = document.createElement('a');
    a.href = document.getElementById('canvas').toDataURL();
    a.download = 'chart.png';
    a.click();
}

update();
</script>

</body>
</html>
